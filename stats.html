<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seoul, London, Paris Price History</title>
  <link rel="stylesheet" href="/assets/css/stats.css" />
</head>
<body>
  <header>
    <a href="/" class="logo">P</a>
    <h1>Seoul, London, Paris Price History</h1>
    <div class="spacer"></div>
    <input type="date" id="datePicker">
    <button id="loadBtn" type="button">Load</button>
    <a href="/" class="link">Dashboard</a>
  </header>

  <div class="status" id="statusBar">Loading Seoul, London, and Paris with the same chart page.</div>

  <main class="grid">
    <section class="panel">
      <div class="panel-head">Seoul</div>
      <iframe id="frame-seoul" title="Seoul price history"></iframe>
    </section>
    <section class="panel">
      <div class="panel-head">London</div>
      <iframe id="frame-london" title="London price history"></iframe>
    </section>
    <section class="panel">
      <div class="panel-head">Paris</div>
      <iframe id="frame-paris" title="Paris price history"></iframe>
    </section>
  </main>

  <script src="/assets/js/stats.js"></script>
</body>
</html>
