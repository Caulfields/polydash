<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EGLC Daily Forecast — Polydash</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preload" href="https://unpkg.com/preact@10/dist/preact.umd.js" as="script" crossorigin>
  <link rel="preload" href="https://unpkg.com/preact@10/hooks/dist/hooks.umd.js" as="script" crossorigin>
  <link rel="preload" href="https://unpkg.com/htm/dist/htm.umd.js" as="script" crossorigin>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c1017; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/preact@10/dist/preact.umd.js"></script>
  <script src="https://unpkg.com/preact@10/hooks/dist/hooks.umd.js"></script>
  <script src="https://unpkg.com/htm/dist/htm.umd.js"></script>

  <script>
    const { h, render, Fragment } = preact;
    const { useState, useEffect, useCallback, useRef } = preactHooks;
    const html = htm.bind(h);

    const LAT = 51.5053, LON = 0.0553;

    function calcBias(wind, cloud, isDay, hour) {
      let bias = 0.6;
      if (isDay) { const sf=Math.max(0,(100-cloud)/100); const wd=Math.max(0.2,1-wind/25); bias+=sf*wd*1.8; }
      else { bias += Math.max(0,(100-cloud)/100)*0.8; }
      if (wind>15) bias-=0.4; if (cloud>80) bias-=0.3;
      if (isDay&&hour>=12&&hour<=16&&cloud<50) bias+=0.4;
      bias+=0.3;
      return Math.round(Math.max(0,Math.min(bias,4))*10)/10;
    }

    function buildRows(data, metarPoints, sunriseH, sunsetH) {
      const hourly=data?.hourly||{}, times=hourly.time||[], temps=hourly.temperature_2m||[];
      const winds=hourly.wind_speed_10m||[], clouds=hourly.cloud_cover||[], humids=hourly.relative_humidity_2m||[];
      return times.map((t,i) => {
        const h=parseInt(t.slice(11,13)), om=temps[i], w=winds[i]||0, c=clouds[i]||0;
        const day=h>=sunriseH&&h<sunsetH;
        const bias=calcBias(w,c,day,h), corrected=Math.round((om+bias)*10)/10;
        return { hour:h, label:`${String(h).padStart(2,'0')}:00`, om, wind:w, cloud:c, humidity:humids[i]||0,
          bias, corrected, correctedRound:Math.round(corrected), isDay:day, metar:metarPoints[h]??null };
      });
    }

    function downloadCSV(archive) {
      const headers = ['London','UKV OM°C','UKV Bias','UKV→METAR°C','ICON OM°C','ICON Bias','ICON→METAR°C','Обл%','Ветер км/ч','Влажн%','METAR факт°C'];
      const lines = [headers.join(',')];
      archive.rows.forEach(r => {
        lines.push([r.hour, r.ukv_om??'', r.ukv_bias??'', r.ukv_metar??'',
          r.icon_om??'', r.icon_bias??'', r.icon_metar??'',
          r.cloud??'', r.wind??'', r.humidity??'', r.metar_fact??''].join(','));
      });
      const blob = new Blob(['\uFEFF'+lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`EGLC_${archive.dateTag}.csv`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // ── Original chart (single model) ──────────────────────────────────────
    function SvgChart({ chartData, nowFrac }) {
      const [tooltip, setTooltip] = useState(null);
      const svgRef = useRef(null);
      const W=700, H=220, PAD={ top:14, right:16, bottom:28, left:36 };
      const w=W-PAD.left-PAD.right, hh=H-PAD.top-PAD.bottom;

      const allT = chartData.flatMap(d=>[d.om,d.corrected,d.metar].filter(v=>v!=null));
      const yMin=Math.floor(Math.min(...allT)-1), yMax=Math.ceil(Math.max(...allT)+1);
      const xScale = i => PAD.left+(i/(chartData.length-1))*w;
      const yScale = v => PAD.top+hh-((v-yMin)/(yMax-yMin))*hh;

      const pointsOM  = chartData.map((d,i)=>`${xScale(i)},${yScale(d.om)}`).join(' ');
      const pointsCor = chartData.map((d,i)=>`${xScale(i)},${yScale(d.corrected)}`).join(' ');

      const yTicks = [];
      for (let t=yMin; t<=yMax; t++) { if ((t-yMin)%2===0) yTicks.push(t); }

      const handleMouseMove = e => {
        const svg=svgRef.current; if(!svg) return;
        const rect=svg.getBoundingClientRect();
        const mx=(e.clientX-rect.left)*(W/rect.width);
        const frac=Math.max(0, Math.min(chartData.length-1, ((mx-PAD.left)/w)*(chartData.length-1)));
        setTooltip({ frac });
      };

      const interp = tooltip ? (() => {
        const f=tooltip.frac, lo=Math.floor(f), hi=Math.min(lo+1, chartData.length-1), t=f-lo;
        const a=chartData[lo], b=chartData[hi];
        const om=Math.round((a.om+(b.om-a.om)*t)*10)/10;
        const corrected=Math.round((a.corrected+(b.corrected-a.corrected)*t)*10)/10;
        const bias=Math.round((a.bias+(b.bias-a.bias)*t)*10)/10;
        const totalMin=Math.round(f*60), hrs=Math.floor(totalMin/60), mins=totalMin%60;
        const label=`${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
        const metar=t<0.5?a.metar:b.metar;
        return { om, corrected, correctedRound:Math.round(corrected), bias, label, isDay:a.isDay, wind:a.wind, cloud:a.cloud, metar };
      })() : null;
      const tooltipX = tooltip ? PAD.left+(tooltip.frac/(chartData.length-1))*w : null;
      const nowX = PAD.left+(nowFrac/23)*w;

      return html`
        <div style=${{ position:'relative' }}>
          <svg ref=${svgRef} viewBox="0 0 ${W} ${H}" style=${{ width:'100%', display:'block', cursor:'crosshair' }}
            onMouseMove=${handleMouseMove} onMouseLeave=${()=>setTooltip(null)}>
            ${yTicks.map(t=>html`
              <g key=${t}>
                <line x1=${PAD.left} x2=${PAD.left+w} y1=${yScale(t)} y2=${yScale(t)} stroke="#1a2030" stroke-width="1"/>
                <text x=${PAD.left-4} y=${yScale(t)+4} text-anchor="end" font-size="9" fill="#4b5563">${t}°</text>
              </g>
            `)}
            ${chartData.filter((_,i)=>i%3===0).map((d,i)=>html`
              <text key=${i} x=${xScale(chartData.indexOf(d))} y=${H-6} text-anchor="middle" font-size="9" fill="#4b5563">${d.label}</text>
            `)}
            <g>
              <line x1=${nowX} x2=${nowX} y1=${PAD.top} y2=${PAD.top+hh} stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
              <text x=${nowX} y=${PAD.top-2} text-anchor="middle" font-size="8" fill="#4b5563">сейчас</text>
            </g>
            <polygon points="${PAD.left},${PAD.top+hh} ${pointsCor} ${PAD.left+w},${PAD.top+hh}" fill="#1e3a5f" fill-opacity="0.3"/>
            <polyline points=${pointsOM}  fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3"/>
            <polyline points=${pointsCor} fill="none" stroke="#3b82f6" stroke-width="2.5"/>
            ${chartData.map((d,i)=>d.metar!=null?html`
              <circle key=${i} cx=${xScale(i)} cy=${yScale(d.metar)} r="5" fill="#fbbf24" stroke="#0c1017" stroke-width="2"/>
            `:null)}
            ${tooltip&&interp&&html`
              <line x1=${tooltipX} x2=${tooltipX} y1=${PAD.top} y2=${PAD.top+hh} stroke="#475569" stroke-width="1" stroke-dasharray="2 2"/>
              <circle cx=${tooltipX} cy=${yScale(interp.om)} r="3" fill="#475569"/>
              <circle cx=${tooltipX} cy=${yScale(interp.corrected)} r="4" fill="#3b82f6"/>
            `}
          </svg>

          ${tooltip&&interp&&html`
            <div style=${{ position:'absolute', top:8, right:8, background:'#1a2030', border:'1px solid #2a3345', borderRadius:6, padding:'8px 12px', fontSize:11, color:'#94a3b8', pointerEvents:'none', minWidth:160 }}>
              <div style=${{ fontWeight:700, color:'#e2e8f0', marginBottom:4 }}>${interp.label} London ${interp.isDay?'☀️':'🌙'}</div>
              <div>OpenMeteo: <strong style=${{ color:'#94a3b8' }}>${interp.om}°C</strong></div>
              <div>Поправка: <strong style=${{ color:'#f59e0b' }}>+${interp.bias}°C</strong></div>
              <div>METAR прогноз: <strong style=${{ color:'#60a5fa' }}>${interp.corrected}°C</strong> (≈${interp.correctedRound}°C)</div>
              ${interp.metar!=null&&html`<div>METAR факт: <strong style=${{ color:'#fbbf24' }}>${interp.metar}°C</strong> · Δ=${(interp.metar-interp.corrected>0?'+':'')}${(interp.metar-interp.corrected).toFixed(1)}°C</div>`}
              <div style=${{ marginTop:4, color:'#4b5563', fontSize:10 }}>Ветер ${interp.wind} · Обл. ${interp.cloud}%</div>
            </div>
          `}

          <div style=${{ display:'flex', justifyContent:'center', gap:16, marginTop:6, fontSize:10, color:'#8b95a5' }}>
            <span><span style=${{ color:'#475569' }}>---</span> OpenMeteo</span>
            <span><span style=${{ color:'#3b82f6' }}>—</span> METAR прогноз</span>
            <span><span style=${{ color:'#fbbf24' }}>●</span> METAR факт</span>
          </div>
        </div>
      `;
    }

    // ── Archive snapshot viewer ────────────────────────────────────────────
    function ArchiveTable({ rows }) {
      const maxUKV  = rows.reduce((m,r)=>r.ukv_metar>m.ukv_metar?r:m, rows[0]);
      const maxICON = rows.reduce((m,r)=>r.icon_metar>m.icon_metar?r:m, rows[0]);
      return html`
        <div style=${{ overflowX:'auto', marginTop:10 }}>
          <table style=${{ width:'100%', borderCollapse:'collapse', fontSize:10 }}>
            <thead>
              <tr>
                <th style=${S.th} rowspan="2">London</th>
                <th style=${{ ...S.th, color:'#3b82f6', textAlign:'center', borderBottom:'none' }} colspan="4">UKV Met Office</th>
                <th style=${{ ...S.th, color:'#22d3ee', textAlign:'center', borderBottom:'none' }} colspan="4">ICON-EU DWD</th>
                <th style=${{ ...S.th, color:'#fbbf24' }} rowspan="2">Факт</th>
                <th style=${S.th} rowspan="2">Δ</th>
              </tr>
              <tr>
                <th style=${{ ...S.th, color:'#3b82f6' }}>→METAR</th>
                <th style=${S.th}>Обл</th>
                <th style=${S.th}>Ветер</th>
                <th style=${{ ...S.th, color:'#f59e0b' }}>Bias</th>
                <th style=${{ ...S.th, color:'#22d3ee' }}>→METAR</th>
                <th style=${S.th}>Обл</th>
                <th style=${S.th}>Ветер</th>
                <th style=${{ ...S.th, color:'#f59e0b' }}>Bias</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => {
                const isPeakUKV  = r.ukv_metar  === maxUKV.ukv_metar;
                const isPeakICON = r.icon_metar === maxICON.icon_metar;
                const delta = r.metar_fact != null ? r.metar_fact - r.ukv_metar : null;
                return html`
                  <tr key=${r.hour} style=${{ borderBottom:'1px solid #0e1320' }}>
                    <td style=${{ ...S.td2, color:'#64748b' }}>${r.hour}${r.isDay?'':' 🌙'}</td>
                    <td style=${{ ...S.td2, color:'#60a5fa', fontWeight:isPeakUKV?700:500 }}>${r.ukv_metar??'—'}°C${isPeakUKV?' ★':''}</td>
                    <td style=${{ ...S.td2, color:r.ukv_cloud>70?'#64748b':r.ukv_cloud<30?'#fde047':'#94a3b8' }}>${r.ukv_cloud??'—'}%</td>
                    <td style=${S.td2}>${r.ukv_wind??'—'}</td>
                    <td style=${{ ...S.td2, color:'#f59e0b' }}>+${r.ukv_bias}</td>
                    <td style=${{ ...S.td2, color:'#22d3ee', fontWeight:isPeakICON?700:500 }}>${r.icon_metar??'—'}°C${isPeakICON?' ★':''}</td>
                    <td style=${{ ...S.td2, color:r.icon_cloud>70?'#64748b':r.icon_cloud<30?'#fde047':'#94a3b8' }}>${r.icon_cloud??'—'}%</td>
                    <td style=${S.td2}>${r.icon_wind??'—'}</td>
                    <td style=${{ ...S.td2, color:'#f59e0b' }}>+${r.icon_bias??'—'}</td>
                    <td style=${{ ...S.td2, color:'#fbbf24', fontWeight:600 }}>${r.metar_fact??''}</td>
                    <td style=${{ ...S.td2, color:delta==null?'transparent':Math.abs(delta)<=1?'#22c55e':'#ef4444', fontWeight:600 }}>
                      ${delta!=null?(delta>0?'+':'')+delta.toFixed(1):''}
                    </td>
                  </tr>`;
              })}
            </tbody>
          </table>
        </div>
      `;
    }

    const todayLondon = () => new Date().toLocaleDateString('en-CA', { timeZone: 'Europe/London' });
    const METAR_KEY = () => `eglc-forecast-metar-${todayLondon()}`;

    const MODELS = [
      { id: 'best_match',                label: 'Best Match', note: 'ICON ~7km' },
      { id: 'ukmo_uk_deterministic_2km', label: 'UKV',        note: 'Met Office 2km' },
      { id: 'icon_eu',                   label: 'ICON-EU',    note: 'DWD 7km' },
    ];

    function App() {
      const [data,     setData]     = useState(null);
      const [dataUKV,  setDataUKV]  = useState(null);
      const [dataICON, setDataICON] = useState(null);
      const [loading,  setLoading]  = useState(true);
      const [error,    setError]    = useState(null);
      const [lastFetch,setLastFetch]= useState(null);
      const [model,    setModel]    = useState('best_match');
      const [metarPoints, setMetarPoints] = useState(() => {
        try { return JSON.parse(localStorage.getItem(METAR_KEY()) || '{}'); } catch { return {}; }
      });
      const [metarInput, setMetarInput] = useState('');
      const [metarHour, setMetarHour] = useState(
        parseInt(new Date().toLocaleString('en-GB', { timeZone: 'Europe/London', hour: 'numeric', hour12: false }))
      );
      const [archives,   setArchives]   = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('eglc-forecast-archives') || '[]');
          return saved.map(a => ({ ...a, timestamp: new Date(a.timestamp) }));
        } catch { return []; }
      });
      const [expandedId, setExpandedId] = useState(null);

      useEffect(() => {
        try { localStorage.setItem('eglc-forecast-archives', JSON.stringify(archives)); } catch {}
      }, [archives]);

      const doFetch = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const base = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,wind_speed_10m,cloud_cover,relative_humidity_2m&daily=sunrise,sunset&timezone=Europe%2FLondon&forecast_days=1`;
          const mp = model === 'best_match' ? '' : `&models=${model}`;
          const [rChart, rUKV, rICON] = await Promise.all([
            fetch(base + mp),
            fetch(base + '&models=ukmo_uk_deterministic_2km'),
            fetch(base + '&models=icon_eu'),
          ]);
          if (!rChart.ok) throw new Error(`HTTP ${rChart.status}`);
          const [dChart, dUKV, dICON] = await Promise.all([rChart.json(), rUKV.ok?rUKV.json():null, rICON.ok?rICON.json():null]);
          setData(dChart); setDataUKV(dUKV); setDataICON(dICON);
          setLastFetch(new Date());
        } catch(e) { setError(e.message); }
        setLoading(false);
      }, [model]);

      useEffect(() => {
        doFetch();
        const id = setInterval(doFetch, 10 * 60 * 1000);
        return () => clearInterval(id);
      }, [doFetch]);

      const addMetarPoint = () => {
        if (metarInput==='') return;
        const updated = { ...metarPoints, [metarHour]: parseInt(metarInput) };
        setMetarPoints(updated);
        try { localStorage.setItem(METAR_KEY(), JSON.stringify(updated)); } catch {}
        setMetarInput('');
        // sync metar_fact into snapshots taken today
        const today = todayLondon();
        setArchives(prev => prev.map(arch => {
          if (arch.dateKey !== today) return arch;
          return { ...arch, rows: arch.rows.map(r => {
            const h = parseInt(r.hour); // "15:00" → 15
            return updated[h] !== undefined ? { ...r, metar_fact: updated[h] } : r;
          })};
        }));
      };

      if (loading&&!data) return html`<div style=${S.wrap}><div style=${S.loading}>📡 Загрузка OpenMeteo...</div></div>`;
      if (error&&!data)   return html`<div style=${S.wrap}><div style=${S.errBox}>
        <div style=${{ fontSize:14, marginBottom:8 }}>⚠ Не удалось загрузить данные</div>
        <div style=${{ fontSize:11, color:'#94a3b8', marginBottom:10 }}>${error}</div>
        <button onClick=${doFetch} style=${S.retryBtn}>↻ Попробовать снова</button>
      </div></div>`;

      const hourly=data?.hourly||{}, times=hourly.time||[], temps=hourly.temperature_2m||[];
      const winds=hourly.wind_speed_10m||[], clouds=hourly.cloud_cover||[], humids=hourly.relative_humidity_2m||[];

      let sunriseH=6, sunsetH=19;
      try {
        if (data?.daily?.sunrise?.[0]) sunriseH=parseInt(data.daily.sunrise[0].slice(11,13));
        if (data?.daily?.sunset?.[0])  sunsetH=parseInt(data.daily.sunset[0].slice(11,13));
      } catch {}

      const chartData = times.map((t,i) => {
        const h=parseInt(t.slice(11,13)), om=temps[i], w=winds[i]||0, c=clouds[i]||0;
        const day=h>=sunriseH&&h<sunsetH;
        const bias=calcBias(w,c,day,h), corrected=Math.round((om+bias)*10)/10;
        return { hour:h, label:`${String(h).padStart(2,'0')}:00`, om, wind:w, cloud:c, humidity:humids[i]||0,
          bias, corrected, correctedRound:Math.round(corrected), isDay:day, metar:metarPoints[h]??null };
      });

      const rowsUKV  = dataUKV  ? buildRows(dataUKV,  metarPoints, sunriseH, sunsetH) : [];
      const rowsICON = dataICON ? buildRows(dataICON, metarPoints, sunriseH, sunsetH) : [];

      const maxCor = chartData.reduce((m,d)=>d.corrected>m.corrected?d:m, chartData[0]);
      const maxOM  = chartData.reduce((m,d)=>d.om>m.om?d:m, chartData[0]);
      const _now   = new Date();
      const nowH   = parseInt(_now.toLocaleString('en-GB',{timeZone:'Europe/London',hour:'numeric',hour12:false}));
      const nowFrac = nowH + _now.getMinutes()/60;

      const saveArchive = () => {
        if (!rowsUKV.length && !rowsICON.length) return;
        const now = new Date();
        const dateTag = now.toLocaleDateString('ru-RU',{timeZone:'Europe/London'}).replace(/\./g,'-')+'_'+now.toLocaleTimeString('ru-RU',{timeZone:'Europe/London'}).replace(/:/g,'-');
        const rows = rowsUKV
          .filter(ukv => ukv.hour >= 7 && ukv.hour <= 20)
          .map((ukv,i) => {
            const srcIdx = rowsUKV.indexOf(ukv);
            const icon = rowsICON[srcIdx]||{};
            return { hour:ukv.label,
              ukv_om:ukv.om, ukv_bias:ukv.bias, ukv_metar:ukv.correctedRound, ukv_cloud:ukv.cloud, ukv_wind:ukv.wind,
              icon_om:icon.om??null, icon_bias:icon.bias??null, icon_metar:icon.correctedRound??null, icon_cloud:icon.cloud??null, icon_wind:icon.wind??null,
              metar_fact:ukv.metar, isDay:ukv.isDay };
          });
        const id = Date.now();
        setArchives(prev => [{ id, timestamp:now, dateTag, dateKey:todayLondon(), rows }, ...prev]);
        setExpandedId(id);
      };

      const navLink = (href,label,active) => html`
        <a href=${href} style=${{ color:active?'#93c5fd':'#4b5563', fontSize:10, textDecoration:'none', border:`1px solid ${active?'#2563eb':'#1a2030'}`, padding:'4px 10px', borderRadius:4, background:active?'#1a2540':'transparent' }}>${label}</a>
      `;

      return html`
        <div style=${S.wrap}>
          <div style=${{ display:'flex', gap:8, marginBottom:16, paddingBottom:10, borderBottom:'1px solid #1a2030' }}>
            ${navLink('/','← Polydash',false)}
            ${navLink('/weth/bias.html','Bias',false)}
            ${navLink('/weth/tracker.html','Tracker',false)}
            ${navLink('/weth/forecast.html','Forecast',true)}
          </div>

          <div style=${S.header}>
            <div>
              <div style=${S.h1}>EGLC DAILY FORECAST</div>
              <div style=${S.sub}>Прогноз METAR с поправкой на bias</div>
            </div>
            <button onClick=${doFetch} style=${S.refreshBtn}>↻</button>
          </div>

          <div style=${{ display:'flex', gap:6, marginBottom:12, flexWrap:'wrap' }}>
            ${MODELS.map(m => html`
              <button key=${m.id} onClick=${() => setModel(m.id)} style=${{ background:model===m.id?'#1a2540':'#10141e', border:`1px solid ${model===m.id?'#2563eb':'#1a2030'}`, color:model===m.id?'#93c5fd':'#4b5563', padding:'6px 10px', borderRadius:5, cursor:'pointer', fontSize:10, fontFamily:'inherit' }}>
                ${m.label} <span style=${{ opacity:0.5, fontSize:9 }}>${m.note}</span>
              </button>
            `)}
          </div>

          <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:14 }}>
            <div style=${S.kpi}><div style=${S.kpiLabel}>МАКС OPENMETEO</div><div style=${S.kpiVal}>${maxOM.om}°C</div><div style=${S.kpiSub}>${maxOM.label}</div></div>
            <div style=${{ ...S.kpi, borderColor:'#1d4ed8' }}><div style=${S.kpiLabel}>МАКС METAR (прогноз)</div><div style=${{ ...S.kpiVal, color:'#60a5fa' }}>${maxCor.corrected}°C</div><div style=${S.kpiSub}>${maxCor.label} · ≈${maxCor.correctedRound}°C</div></div>
            <div style=${S.kpi}><div style=${S.kpiLabel}>ПОПРАВКА В ПИКЕ</div><div style=${{ ...S.kpiVal, color:'#f59e0b' }}>+${maxCor.bias}°C</div><div style=${S.kpiSub}>обл. ${maxCor.cloud}% ветер ${maxCor.wind}</div></div>
          </div>

          <div style=${{ ...S.card, padding:12 }}>
            <${SvgChart} chartData=${chartData} nowFrac=${nowFrac} />
          </div>

          <div style=${S.card}>
            <div style=${S.cardTitle}>ДОБАВИТЬ ТОЧКУ METAR</div>
            <div style=${{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
              <select value=${metarHour} onChange=${e=>setMetarHour(+e.target.value)} style=${S.select}>
                ${Array.from({length:24},(_,i)=>html`<option key=${i} value=${i}>${String(i).padStart(2,'0')}:00 London</option>`)}
              </select>
              <input type="number" placeholder="14" value=${metarInput} onInput=${e=>setMetarInput(e.target.value)} style=${{ ...S.numInput, width:70, fontSize:18, textAlign:'center' }} />
              <span style=${{ color:'#4b5563' }}>°C</span>
              <button onClick=${addMetarPoint} style=${S.addBtn}>+ Добавить</button>
            </div>
            ${Object.keys(metarPoints).length>0&&html`<div style=${{ marginTop:8, fontSize:10, color:'#4b5563' }}>
              Точки: ${Object.entries(metarPoints).sort((a,b)=>a[0]-b[0]).map(([h,v])=>`${String(h).padStart(2,'0')}:00→${v}°C`).join(' · ')}
            </div>`}
          </div>

          <div style=${{ ...S.card, padding:'14px 8px' }}>
            <div style=${{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, paddingLeft:6 }}>
              <div style=${S.cardTitle}>ПОЧАСОВОЙ ПРОГНОЗ</div>
              <button onClick=${saveArchive} style=${S.archiveBtn}>⬇ Сохранить снимок</button>
            </div>
            <div style=${{ overflowX:'auto' }}>
              <table style=${{ width:'100%', borderCollapse:'collapse', fontSize:10 }}>
                <thead><tr>
                  <th style=${S.th}>London</th>
                  <th style=${{ ...S.th, color:'#3b82f6' }}>UKV→METAR</th>
                  <th style=${{ ...S.th, color:'#22d3ee' }}>ICON→METAR</th>
                  <th style=${S.th}>Обл</th>
                  <th style=${S.th}>Ветер</th>
                  <th style=${S.th}>Bias</th>
                  <th style=${{ ...S.th, color:'#fbbf24' }}>Факт</th>
                  <th style=${S.th}>Δ</th>
                </tr></thead>
                <tbody>
                  ${rowsUKV.map((ukv,i) => {
                    const icon = rowsICON[i]||{};
                    const isNow=ukv.hour===nowH, isPeakUKV=maxCor&&ukv.hour===maxCor.hour;
                    return html`
                      <tr key=${ukv.hour} style=${{ background:isNow?'#111d2e':'transparent', borderBottom:'1px solid #0e1320' }}>
                        <td style=${{ ...S.td2, color:isNow?'#93c5fd':'#64748b', fontWeight:isNow?700:400 }}>${ukv.label}${ukv.isDay?'':' 🌙'}</td>
                        <td style=${{ ...S.td2, color:'#60a5fa', fontWeight:isPeakUKV?700:500 }}>${ukv.correctedRound}°C${isPeakUKV?' ★':''}</td>
                        <td style=${{ ...S.td2, color:'#22d3ee' }}>${icon.correctedRound!=null?`${icon.correctedRound}°C`:'—'}</td>
                        <td style=${{ ...S.td2, color:ukv.cloud>70?'#64748b':ukv.cloud<30?'#fde047':'#94a3b8' }}>${ukv.cloud}%</td>
                        <td style=${S.td2}>${ukv.wind}</td>
                        <td style=${{ ...S.td2, color:'#f59e0b' }}>+${ukv.bias}</td>
                        <td style=${{ ...S.td2, color:'#fbbf24', fontWeight:600 }}>${ukv.metar??''}</td>
                        <td style=${{ ...S.td2, color:ukv.metar==null?'transparent':Math.abs(ukv.metar-ukv.corrected)<=1?'#22c55e':'#ef4444', fontWeight:600 }}>
                          ${ukv.metar!=null?((ukv.metar-ukv.corrected)>0?'+':'')+(ukv.metar-ukv.corrected).toFixed(1):''}
                        </td>
                      </tr>`;
                  })}
                </tbody>
              </table>
            </div>
          </div>

          ${archives.length>0&&html`
            <div style=${S.card}>
              <div style=${S.cardTitle}>АРХИВ СНИМКОВ (${archives.length})</div>
              <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
                ${archives.map((arch,idx)=>html`
                  <div key=${arch.id}>
                    <div style=${{ ...S.archiveRow, cursor:'pointer' }} onClick=${()=>setExpandedId(expandedId===arch.id?null:arch.id)}>
                      <div style=${{ flex:1, display:'flex', alignItems:'center', gap:10 }}>
                        <span style=${{ color:'#64748b', fontSize:10 }}>${expandedId===arch.id?'▾':'▸'}</span>
                        <span style=${{ color:'#94a3b8', fontSize:11, fontWeight:600 }}>#${archives.length-idx}</span>
                        <span style=${{ color:'#4b5563', fontSize:10 }}>${arch.timestamp.toLocaleDateString('ru-RU',{timeZone:'Europe/London'})} ${arch.timestamp.toLocaleTimeString('ru-RU',{timeZone:'Europe/London'})} LON</span>
                        <span style=${{ color:'#3e4a5c', fontSize:9 }}>UKV + ICON-EU · ${arch.rows.length} ч</span>
                      </div>
                      <div style=${{ display:'flex', gap:6 }} onClick=${e=>e.stopPropagation()}>
                        <button onClick=${()=>downloadCSV(arch)} style=${S.dlBtn}>↓ CSV</button>
                        <button onClick=${()=>{ setArchives(prev=>prev.filter(a=>a.id!==arch.id)); if(expandedId===arch.id) setExpandedId(null); }} style=${S.delBtn}>✕</button>
                      </div>
                    </div>
                    ${expandedId===arch.id&&html`
                      <div style=${{ background:'#0c1017', border:'1px solid #1a2030', borderTop:'none', borderRadius:'0 0 5px 5px', padding:'0 8px 10px' }}>
                        <${ArchiveTable} rows=${arch.rows} />
                      </div>
                    `}
                  </div>
                `)}
              </div>
            </div>
          `}

          <div style=${{ textAlign:'center', fontSize:9, color:'#1e293b', marginTop:10 }}>
            ${lastFetch&&`Обновлено: ${lastFetch.toLocaleTimeString('ru-RU',{timeZone:'Europe/London'})}`} · ★ = прогнозируемый пик
          </div>
        </div>
      `;
    }

    const S = {
      wrap:       { fontFamily:"'IBM Plex Mono','Courier New',monospace", background:'#0c1017', color:'#8b95a5', minHeight:'100vh', padding:16, boxSizing:'border-box' },
      header:     { display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid #1a2030', paddingBottom:12, marginBottom:14 },
      h1:         { fontSize:17, fontWeight:700, color:'#e8ecf1', letterSpacing:2 },
      sub:        { fontSize:10, color:'#3e4a5c', marginTop:2 },
      refreshBtn: { background:'#10141e', border:'1px solid #1a2030', color:'#64748b', width:36, height:36, borderRadius:6, cursor:'pointer', fontSize:16, fontFamily:'inherit' },
      card:       { background:'#10141e', border:'1px solid #1a2030', borderRadius:7, padding:14, marginBottom:12 },
      cardTitle:  { fontSize:9, fontWeight:700, color:'#3e4a5c', letterSpacing:1.5, marginBottom:10 },
      kpi:        { background:'#10141e', border:'1px solid #1a2030', borderRadius:7, padding:10, textAlign:'center' },
      kpiLabel:   { fontSize:8, fontWeight:700, color:'#3e4a5c', letterSpacing:1, marginBottom:4 },
      kpiVal:     { fontSize:22, fontWeight:700, color:'#e2e8f0' },
      kpiSub:     { fontSize:9, color:'#4b5563', marginTop:2 },
      numInput:   { background:'#0c1017', border:'1px solid #1e293b', color:'#e2e8f0', padding:'8px 10px', borderRadius:5, fontSize:14, fontFamily:'inherit', outline:'none' },
      select:     { background:'#0c1017', border:'1px solid #1e293b', color:'#e2e8f0', padding:'8px 10px', borderRadius:5, fontSize:12, fontFamily:'inherit', outline:'none' },
      addBtn:     { background:'#1a2540', border:'1px solid #2563eb', color:'#93c5fd', padding:'8px 14px', borderRadius:5, cursor:'pointer', fontSize:11, fontFamily:'inherit' },
      archiveBtn: { background:'#0f2b1a', border:'1px solid #16a34a', color:'#4ade80', padding:'5px 12px', borderRadius:5, cursor:'pointer', fontSize:10, fontFamily:'inherit', fontWeight:600 },
      archiveRow: { display:'flex', alignItems:'center', gap:8, background:'#0c1017', border:'1px solid #1a2030', borderRadius:5, padding:'8px 10px' },
      dlBtn:      { background:'#0c2233', border:'1px solid #0e7490', color:'#22d3ee', padding:'4px 10px', borderRadius:4, cursor:'pointer', fontSize:10, fontFamily:'inherit' },
      delBtn:     { background:'#1a0a0a', border:'1px solid #3f1515', color:'#64748b', padding:'4px 8px', borderRadius:4, cursor:'pointer', fontSize:10, fontFamily:'inherit' },
      th:         { padding:'6px 3px', textAlign:'right', color:'#3e4a5c', fontWeight:600, fontSize:8, letterSpacing:0.5, borderBottom:'1px solid #1a2030' },
      td2:        { padding:'5px 3px', textAlign:'right', color:'#64748b', fontSize:10 },
      loading:    { padding:40, textAlign:'center', color:'#4b5563', fontSize:13 },
      errBox:     { background:'#10141e', border:'1px solid #5c1a1a', borderRadius:7, padding:20, textAlign:'center', color:'#f87171', marginTop:40 },
      retryBtn:   { background:'#1a0a0a', border:'1px solid #7f1d1d', color:'#f87171', padding:'8px 16px', borderRadius:5, cursor:'pointer', fontSize:12, fontFamily:'inherit' },
    };

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
