<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EGLC Daily Forecast — Polydash</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c1017; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const LAT = 51.5053, LON = 0.0553;

    function calcBias(wind, cloud, isDay, hour) {
      let bias = 0.6;
      if (isDay) {
        const sf = Math.max(0, (100 - cloud) / 100);
        const wd = Math.max(0.2, 1 - wind / 25);
        bias += sf * wd * 1.8;
      } else {
        bias += Math.max(0, (100 - cloud) / 100) * 0.8;
      }
      if (wind > 15) bias -= 0.4;
      if (cloud > 80) bias -= 0.3;
      if (isDay && hour >= 12 && hour <= 16 && cloud < 50) bias += 0.4;
      bias += 0.3;
      return Math.round(Math.max(0, Math.min(bias, 4)) * 10) / 10;
    }

    function isDayHour(h, sunrise, sunset) {
      return h >= sunrise && h < sunset;
    }

    // Simple SVG line chart
    function SvgChart({ chartData, nowH, nowFrac, maxCorrectedHour }) {
      const [tooltip, setTooltip] = useState(null);
      const svgRef = useRef(null);

      const W = 700, H = 220;
      const PAD = { top: 14, right: 16, bottom: 28, left: 36 };
      const w = W - PAD.left - PAD.right;
      const h = H - PAD.top - PAD.bottom;

      const allTemps = chartData.flatMap(d => [d.om, d.corrected, d.metar].filter(v => v != null));
      const yMin = Math.floor(Math.min(...allTemps) - 1);
      const yMax = Math.ceil(Math.max(...allTemps) + 1);

      const xScale = (i) => PAD.left + (i / (chartData.length - 1)) * w;
      const yScale = (v) => PAD.top + h - ((v - yMin) / (yMax - yMin)) * h;

      const pointsOM = chartData.map((d, i) => `${xScale(i)},${yScale(d.om)}`).join(' ');
      const pointsCor = chartData.map((d, i) => `${xScale(i)},${yScale(d.corrected)}`).join(' ');

      // Y grid lines
      const yTicks = [];
      for (let t = yMin; t <= yMax; t++) {
        if ((t - yMin) % 2 === 0) yTicks.push(t);
      }

      // X labels every 3 hours
      const xLabels = chartData.filter((_, i) => i % 3 === 0);

      const handleMouseMove = (e) => {
        const svg = svgRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (W / rect.width);
        const idx = Math.round(((mx - PAD.left) / w) * (chartData.length - 1));
        if (idx >= 0 && idx < chartData.length) {
          setTooltip({ idx, x: e.clientX - rect.left, y: e.clientY - rect.top });
        }
      };

      const d = tooltip ? chartData[tooltip.idx] : null;

      return (
        <div style={{ position: 'relative' }}>
          <svg
            ref={svgRef}
            viewBox={`0 0 ${W} ${H}`}
            style={{ width: '100%', display: 'block', cursor: 'crosshair' }}
            onMouseMove={handleMouseMove}
            onMouseLeave={() => setTooltip(null)}
          >
            {/* Grid */}
            {yTicks.map(t => (
              <g key={t}>
                <line x1={PAD.left} x2={PAD.left + w} y1={yScale(t)} y2={yScale(t)} stroke="#1a2030" strokeWidth="1" />
                <text x={PAD.left - 4} y={yScale(t) + 4} textAnchor="end" fontSize="9" fill="#4b5563">{t}°</text>
              </g>
            ))}

            {/* X labels */}
            {xLabels.map((d, i) => {
              const origIdx = chartData.indexOf(d);
              return (
                <text key={i} x={xScale(origIdx)} y={H - 6} textAnchor="middle" fontSize="9" fill="#4b5563">
                  {d.label}
                </text>
              );
            })}

            {/* Current time reference line — exact position using fractional hour */}
            {(() => {
              const x = PAD.left + (nowFrac / 23) * w;
              return (
                <g>
                  <line x1={x} x2={x} y1={PAD.top} y2={PAD.top + h} stroke="#334155" strokeWidth="1" strokeDasharray="4 3" />
                  <text x={x} y={PAD.top - 2} textAnchor="middle" fontSize="8" fill="#4b5563">сейчас</text>
                </g>
              );
            })()}

            {/* Area fill under corrected */}
            <polygon
              points={`${PAD.left},${PAD.top + h} ${pointsCor} ${PAD.left + w},${PAD.top + h}`}
              fill="#1e3a5f" fillOpacity="0.3"
            />

            {/* OpenMeteo line (dashed) */}
            <polyline points={pointsOM} fill="none" stroke="#475569" strokeWidth="1.5" strokeDasharray="5 3" />

            {/* Corrected line */}
            <polyline points={pointsCor} fill="none" stroke="#3b82f6" strokeWidth="2.5" />

            {/* METAR actual dots */}
            {chartData.map((d, i) => d.metar != null ? (
              <circle key={i} cx={xScale(i)} cy={yScale(d.metar)} r="5"
                fill="#fbbf24" stroke="#0c1017" strokeWidth="2" />
            ) : null)}

            {/* Tooltip hover dot */}
            {tooltip && d && (
              <>
                <line x1={xScale(tooltip.idx)} x2={xScale(tooltip.idx)} y1={PAD.top} y2={PAD.top + h} stroke="#475569" strokeWidth="1" strokeDasharray="2 2" />
                <circle cx={xScale(tooltip.idx)} cy={yScale(d.om)} r="3" fill="#475569" />
                <circle cx={xScale(tooltip.idx)} cy={yScale(d.corrected)} r="4" fill="#3b82f6" />
              </>
            )}
          </svg>

          {/* Tooltip box */}
          {tooltip && d && (
            <div style={{
              position: 'absolute', top: 8, right: 8,
              background: '#1a2030', border: '1px solid #2a3345', borderRadius: 6,
              padding: '8px 12px', fontSize: 11, color: '#94a3b8', pointerEvents: 'none',
              minWidth: 160,
            }}>
              <div style={{ fontWeight: 700, color: '#e2e8f0', marginBottom: 4 }}>
                {d.label} UTC {d.isDay ? '☀️' : '🌙'}
              </div>
              <div>OpenMeteo: <strong style={{ color: '#94a3b8' }}>{d.om}°C</strong></div>
              <div>Поправка: <strong style={{ color: '#f59e0b' }}>+{d.bias}°C</strong></div>
              <div>METAR прогноз: <strong style={{ color: '#60a5fa' }}>{d.corrected}°C</strong> (≈{d.correctedRound}°C)</div>
              {d.metar != null && <div>METAR факт: <strong style={{ color: '#fbbf24' }}>{d.metar}°C</strong> · Δ={(d.metar - d.corrected > 0 ? '+' : '') + (d.metar - d.corrected).toFixed(1)}°C</div>}
              <div style={{ marginTop: 4, color: '#4b5563', fontSize: 10 }}>Ветер {d.wind} км/ч · Обл. {d.cloud}%</div>
            </div>
          )}

          {/* Legend */}
          <div style={{ display: 'flex', justifyContent: 'center', gap: 16, marginTop: 6, fontSize: 10, color: '#8b95a5' }}>
            <span><span style={{ color: '#475569' }}>---</span> OpenMeteo</span>
            <span><span style={{ color: '#3b82f6' }}>—</span> METAR прогноз</span>
            <span><span style={{ color: '#fbbf24' }}>●</span> METAR факт</span>
          </div>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastFetch, setLastFetch] = useState(null);
      const [metarPoints, setMetarPoints] = useState({});
      const [metarInput, setMetarInput] = useState('');
      const [metarHour, setMetarHour] = useState(parseInt(new Date().toLocaleString('en-GB', { timeZone: 'Europe/London', hour: 'numeric', hour12: false })));

      const doFetch = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const u = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,wind_speed_10m,cloud_cover,relative_humidity_2m&daily=sunrise,sunset&timezone=Europe%2FLondon&forecast_days=1`;
          const r = await fetch(u);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const d = await r.json();
          setData(d);
          setLastFetch(new Date());
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      }, []);

      useEffect(() => { doFetch(); }, [doFetch]);

      const addMetarPoint = () => {
        if (metarInput === '') return;
        setMetarPoints({ ...metarPoints, [metarHour]: parseInt(metarInput) });
        setMetarInput('');
      };

      if (loading && !data) {
        return <div style={S.wrap}><div style={S.loading}>📡 Загрузка OpenMeteo...</div></div>;
      }

      if (error && !data) {
        return (
          <div style={S.wrap}>
            <div style={S.errBox}>
              <div style={{ fontSize: 14, marginBottom: 8 }}>⚠ Не удалось загрузить данные</div>
              <div style={{ fontSize: 11, color: '#94a3b8', marginBottom: 10 }}>{error}</div>
              <button onClick={doFetch} style={S.retryBtn}>↻ Попробовать снова</button>
            </div>
          </div>
        );
      }

      const hourly = data?.hourly || {};
      const times = hourly.time || [];
      const temps = hourly.temperature_2m || [];
      const winds = hourly.wind_speed_10m || [];
      const clouds = hourly.cloud_cover || [];
      const humids = hourly.relative_humidity_2m || [];

      let sunriseH = 6, sunsetH = 19;
      try {
        if (data?.daily?.sunrise?.[0]) sunriseH = parseInt(data.daily.sunrise[0].slice(11, 13));
        if (data?.daily?.sunset?.[0]) sunsetH = parseInt(data.daily.sunset[0].slice(11, 13));
      } catch {}

      const chartData = times.map((t, i) => {
        const h = parseInt(t.slice(11, 13));
        const om = temps[i];
        const w = winds[i] || 0;
        const c = clouds[i] || 0;
        const day = isDayHour(h, sunriseH, sunsetH);
        const bias = calcBias(w, c, day, h);
        const corrected = Math.round((om + bias) * 10) / 10;
        return {
          hour: h,
          label: `${String(h).padStart(2, '0')}:00`,
          om, wind: w, cloud: c, humidity: humids[i] || 0,
          bias, corrected, correctedRound: Math.round(corrected),
          isDay: day,
          metar: metarPoints[h] ?? null,
        };
      });

      const maxCorrected = chartData.reduce((max, d) => d.corrected > max.corrected ? d : max, chartData[0]);
      const maxOM = chartData.reduce((max, d) => d.om > max.om ? d : max, chartData[0]);
      const _now = new Date();
      const nowH = parseInt(_now.toLocaleString('en-GB', { timeZone: 'Europe/London', hour: 'numeric', hour12: false }));
      const nowFrac = nowH + _now.getMinutes() / 60;

      return (
        <div style={S.wrap}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');`}</style>

          {/* Nav */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 16, paddingBottom: 10, borderBottom: '1px solid #1a2030' }}>
            <a href="/" style={{ color: '#4b5563', fontSize: 10, textDecoration: 'none', border: '1px solid #1a2030', padding: '4px 10px', borderRadius: 4 }}>← Polydash</a>
            <a href="/weth/bias.html" style={{ color: '#4b5563', fontSize: 10, textDecoration: 'none', border: '1px solid #1a2030', padding: '4px 10px', borderRadius: 4 }}>Bias</a>
            <a href="/weth/tracker.html" style={{ color: '#4b5563', fontSize: 10, textDecoration: 'none', border: '1px solid #1a2030', padding: '4px 10px', borderRadius: 4 }}>Tracker</a>
            <a href="/weth/forecast.html" style={{ color: '#93c5fd', fontSize: 10, textDecoration: 'none', border: '1px solid #2563eb', padding: '4px 10px', borderRadius: 4, background: '#1a2540' }}>Forecast</a>
          </div>

          {/* Header */}
          <div style={S.header}>
            <div>
              <div style={S.h1}>EGLC DAILY FORECAST</div>
              <div style={S.sub}>Прогноз METAR с поправкой на bias</div>
            </div>
            <button onClick={doFetch} style={S.refreshBtn}>↻</button>
          </div>

          {/* KPIs */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 14 }}>
            <div style={S.kpi}>
              <div style={S.kpiLabel}>МАКС OPENMETEO</div>
              <div style={S.kpiVal}>{maxOM.om}°C</div>
              <div style={S.kpiSub}>{maxOM.label} UTC</div>
            </div>
            <div style={{ ...S.kpi, borderColor: '#1d4ed8' }}>
              <div style={S.kpiLabel}>МАКС METAR (прогноз)</div>
              <div style={{ ...S.kpiVal, color: '#60a5fa' }}>{maxCorrected.corrected}°C</div>
              <div style={S.kpiSub}>{maxCorrected.label} UTC · ≈{maxCorrected.correctedRound}°C</div>
            </div>
            <div style={S.kpi}>
              <div style={S.kpiLabel}>ПОПРАВКА В ПИКЕ</div>
              <div style={{ ...S.kpiVal, color: '#f59e0b' }}>+{maxCorrected.bias}°C</div>
              <div style={S.kpiSub}>обл. {maxCorrected.cloud}% ветер {maxCorrected.wind}</div>
            </div>
          </div>

          {/* Chart */}
          <div style={{ ...S.card, padding: 12 }}>
            <SvgChart chartData={chartData} nowH={nowH} nowFrac={nowFrac} maxCorrectedHour={maxCorrected.hour} />
          </div>

          {/* Add METAR */}
          <div style={S.card}>
            <div style={S.cardTitle}>ДОБАВИТЬ ТОЧКУ METAR</div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
              <select value={metarHour} onChange={e => setMetarHour(+e.target.value)} style={S.select}>
                {Array.from({ length: 24 }, (_, i) => (
                  <option key={i} value={i}>{String(i).padStart(2, '0')}:00 UTC</option>
                ))}
              </select>
              <input type="number" placeholder="14" value={metarInput} onChange={e => setMetarInput(e.target.value)}
                style={{ ...S.numInput, width: 70, fontSize: 18, textAlign: 'center' }} />
              <span style={{ color: '#4b5563' }}>°C</span>
              <button onClick={addMetarPoint} style={S.addBtn}>+ Добавить</button>
            </div>
            {Object.keys(metarPoints).length > 0 && (
              <div style={{ marginTop: 8, fontSize: 10, color: '#4b5563' }}>
                Точки: {Object.entries(metarPoints).sort((a,b)=>a[0]-b[0]).map(([h,v])=>`${String(h).padStart(2,'0')}:00→${v}°C`).join(' · ')}
              </div>
            )}
          </div>

          {/* Hourly table */}
          <div style={{ ...S.card, padding: '14px 8px' }}>
            <div style={S.cardTitle}>ПОЧАСОВОЙ ПРОГНОЗ</div>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 10 }}>
                <thead>
                  <tr>
                    {['UTC', 'OM', 'Обл', 'Ветер', 'Bias', '→METAR', 'Факт', 'Δ'].map((h, i) => (
                      <th key={i} style={{ padding: '6px 3px', textAlign: 'right', color: '#3e4a5c', fontWeight: 600, fontSize: 8, letterSpacing: 0.5, borderBottom: '1px solid #1a2030' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {chartData.map(d => {
                    const isNow = d.hour === nowH;
                    const isPeak = d.hour === maxCorrected.hour;
                    return (
                      <tr key={d.hour} style={{ background: isNow ? '#111d2e' : 'transparent', borderBottom: '1px solid #0e1320' }}>
                        <td style={{ ...S.td2, color: isNow ? '#93c5fd' : '#64748b', fontWeight: isNow ? 700 : 400 }}>{d.label} {d.isDay ? '' : '🌙'}</td>
                        <td style={{ ...S.td2, color: '#94a3b8' }}>{d.om}</td>
                        <td style={{ ...S.td2, color: d.cloud > 70 ? '#64748b' : d.cloud < 30 ? '#fde047' : '#94a3b8' }}>{d.cloud}%</td>
                        <td style={S.td2}>{d.wind}</td>
                        <td style={{ ...S.td2, color: '#f59e0b' }}>+{d.bias}</td>
                        <td style={{ ...S.td2, color: '#60a5fa', fontWeight: isPeak ? 700 : 500 }}>{d.correctedRound}°C {isPeak ? '★' : ''}</td>
                        <td style={{ ...S.td2, color: '#fbbf24', fontWeight: 600 }}>{d.metar ?? ''}</td>
                        <td style={{ ...S.td2, color: d.metar == null ? 'transparent' : Math.abs(d.metar - d.corrected) <= 1 ? '#22c55e' : '#ef4444', fontWeight: 600 }}>
                          {d.metar != null ? ((d.metar - d.corrected) > 0 ? '+' : '') + (d.metar - d.corrected).toFixed(1) : ''}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          <div style={{ textAlign: 'center', fontSize: 9, color: '#1e293b', marginTop: 10 }}>
            {lastFetch && `Обновлено: ${lastFetch.toLocaleTimeString('ru-RU', { timeZone: 'Europe/London' })}`} · ★ = прогнозируемый пик
          </div>
        </div>
      );
    }

    const S = {
      wrap: { fontFamily: "'IBM Plex Mono', 'Courier New', monospace", background: '#0c1017', color: '#8b95a5', minHeight: '100vh', padding: 16, boxSizing: 'border-box' },
      header: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid #1a2030', paddingBottom: 12, marginBottom: 14 },
      h1: { fontSize: 17, fontWeight: 700, color: '#e8ecf1', letterSpacing: 2 },
      sub: { fontSize: 10, color: '#3e4a5c', marginTop: 2 },
      refreshBtn: { background: '#10141e', border: '1px solid #1a2030', color: '#64748b', width: 36, height: 36, borderRadius: 6, cursor: 'pointer', fontSize: 16, fontFamily: 'inherit' },
      card: { background: '#10141e', border: '1px solid #1a2030', borderRadius: 7, padding: 14, marginBottom: 12 },
      cardTitle: { fontSize: 9, fontWeight: 700, color: '#3e4a5c', letterSpacing: 1.5, marginBottom: 10 },
      kpi: { background: '#10141e', border: '1px solid #1a2030', borderRadius: 7, padding: 10, textAlign: 'center' },
      kpiLabel: { fontSize: 8, fontWeight: 700, color: '#3e4a5c', letterSpacing: 1, marginBottom: 4 },
      kpiVal: { fontSize: 22, fontWeight: 700, color: '#e2e8f0' },
      kpiSub: { fontSize: 9, color: '#4b5563', marginTop: 2 },
      numInput: { background: '#0c1017', border: '1px solid #1e293b', color: '#e2e8f0', padding: '8px 10px', borderRadius: 5, fontSize: 14, fontFamily: 'inherit', outline: 'none' },
      select: { background: '#0c1017', border: '1px solid #1e293b', color: '#e2e8f0', padding: '8px 10px', borderRadius: 5, fontSize: 12, fontFamily: 'inherit', outline: 'none' },
      addBtn: { background: '#1a2540', border: '1px solid #2563eb', color: '#93c5fd', padding: '8px 14px', borderRadius: 5, cursor: 'pointer', fontSize: 11, fontFamily: 'inherit' },
      td2: { padding: '5px 3px', textAlign: 'right', color: '#64748b', fontSize: 10 },
      loading: { padding: 40, textAlign: 'center', color: '#4b5563', fontSize: 13 },
      errBox: { background: '#10141e', border: '1px solid #5c1a1a', borderRadius: 7, padding: 20, textAlign: 'center', color: '#f87171', marginTop: 40 },
      retryBtn: { background: '#1a0a0a', border: '1px solid #7f1d1d', color: '#f87171', padding: '8px 16px', borderRadius: 5, cursor: 'pointer', fontSize: 12, fontFamily: 'inherit' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
