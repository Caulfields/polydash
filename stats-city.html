<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price History — Polydash</title>
  <link rel="stylesheet" href="/assets/css/stats-city.css" />
</head>
<body>

<header>
  <a href="/" class="logo">P</a>
  <h1>Price History</h1>
  <div class="header-sep"></div>
  <div class="tab-group" id="cityTabs"></div>
  <button class="metar-btn" id="metarBtn">METAR</button>
  <div class="zoom-controls" aria-label="Chart zoom controls">
    <button class="zoom-btn" id="zoomOutBtn" type="button" title="Zoom out">-</button>
    <button class="zoom-btn" id="zoomResetBtn" type="button" title="Reset zoom">1x</button>
    <button class="zoom-btn" id="zoomInBtn" type="button" title="Zoom in">+</button>
  </div>
  <input type="date" id="datePicker">
  <button class="btn" id="loadBtn">Load</button>
  <a href="/" class="nav-link">← Dashboard</a>
</header>

<div class="status-bar" id="statusBar">Pick a date and click Load</div>

<!-- Day view -->
<div class="chart-wrap" id="chartWrap">
  <canvas id="chart"></canvas>
  <canvas id="overlay"></canvas>
  <div class="loader hidden" id="loader">Loading…</div>
  <div class="tooltip" id="tooltip"></div>
</div>
<div class="legend" id="legend"><span class="leg-empty">No data loaded</span></div>

<script src="/assets/js/stats-city.js"></script>
</body>
</html>
